<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BookNook — Online Bookstore</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#1a2238; --brass:#c9923e; --paper:#faf7f2; }
  body { background: var(--paper); font-family: 'Inter', system-ui, sans-serif; color: var(--ink); }
  .display-font { font-family: 'Fraunces', Georgia, serif; }
  .navbar-brand { font-family: 'Fraunces', serif; font-weight: 700; letter-spacing: .3px; }
  .bg-ink { background: var(--ink) !important; }
  .text-brass { color: var(--brass) !important; }
  .btn-brass { background: var(--brass); border-color: var(--brass); color: #fff; }
  .btn-brass:hover { background: #b07e2f; border-color: #b07e2f; color: #fff; }
  .btn-outline-brass { color: var(--brass); border-color: var(--brass); }
  .btn-outline-brass:hover { background: var(--brass); color: #fff; }
  .book-card { transition: transform .12s ease, box-shadow .12s ease; border: 1px solid #ece6db; border-radius: .6rem; background:#fff; }
  .book-card:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(26,34,56,.10); }
  .cat-pill { cursor: pointer; }
  .price { font-family: 'Fraunces', serif; font-weight: 600; }
  .login-wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; }
  .login-card { max-width: 400px; width:100%; border:1px solid #ece6db; border-radius:.8rem; background:#fff; }
  .nav-link.active { color: var(--brass) !important; font-weight:600; }
  .hidden { display:none !important; }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView" class="login-wrap">
  <div class="login-card p-4 p-md-5 shadow-sm">
    <div class="text-center mb-4">
      <div class="display-font fs-2 text-brass">BookNook</div>
      <div class="text-muted small">Sign in to continue</div>
    </div>
    <div id="loginError" class="alert alert-danger py-2 small hidden"></div>
    <div class="mb-3">
      <label class="form-label small">Username</label>
      <input id="username" class="form-control" autocomplete="username" />
    </div>
    <div class="mb-3">
      <label class="form-label small">Password</label>
      <input id="password" type="password" class="form-control" autocomplete="current-password" />
    </div>
    <button id="loginBtn" class="btn btn-brass w-100">Sign in</button>
    <div class="mt-4 small text-muted">
      <div class="fw-semibold mb-1">Demo accounts</div>
      admin / admin123 &nbsp;·&nbsp; alice / alice123 &nbsp;·&nbsp; bob / bob123
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <nav class="navbar navbar-expand-lg navbar-dark bg-ink">
    <div class="container">
      <span class="navbar-brand mb-0"><span class="text-brass">Book</span>Nook</span>
      <div class="navbar-nav me-auto" id="navTabs"></div>
      <div class="navbar-nav align-items-lg-center">
        <span class="navbar-text me-3 small">Signed in as <span id="navUser" class="text-brass fw-semibold"></span></span>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Log out</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <!-- BROWSE (users) -->
    <section id="browseView" class="hidden">
      <div class="row g-3 mb-3">
        <div class="col-md-7"><input id="search" class="form-control" placeholder="Search by title or author…" /></div>
        <div class="col-md-5"><div id="categories" class="d-flex flex-wrap gap-2"></div></div>
      </div>
      <div id="books" class="row g-3"></div>
    </section>

    <!-- CART -->
    <section id="cartView" class="hidden">
      <h4 class="display-font mb-3">Your Cart</h4>
      <div id="cartItems"></div>
      <div id="cartEmpty" class="text-muted hidden">Your cart is empty.</div>
      <div id="checkoutBox" class="card mt-3 hidden">
        <div class="card-body">
          <div class="d-flex justify-content-between mb-3">
            <span class="fs-5">Subtotal</span><span class="fs-5 price" id="subtotal">$0.00</span>
          </div>
          <div class="row g-2">
            <div class="col-md-4"><input id="cName" class="form-control" placeholder="Full name" /></div>
            <div class="col-md-4"><input id="cEmail" class="form-control" placeholder="Email" /></div>
            <div class="col-md-4"><input id="cAddr" class="form-control" placeholder="Shipping address" /></div>
          </div>
          <button class="btn btn-brass mt-3" id="placeOrder">Place order</button>
        </div>
      </div>
    </section>

    <!-- ORDERS (users) -->
    <section id="ordersView" class="hidden">
      <h4 class="display-font mb-3">Your Orders</h4>
      <div id="ordersList"></div>
      <div id="ordersEmpty" class="text-muted hidden">No orders yet.</div>
    </section>

    <!-- ADMIN: MANAGE BOOKS -->
    <section id="manageView" class="hidden">
      <h4 class="display-font mb-3">Manage Books</h4>
      <div class="card mb-4">
        <div class="card-body">
          <div class="fw-semibold mb-2">Add a book</div>
          <div class="row g-2">
            <div class="col-md-4"><input id="bTitle" class="form-control" placeholder="Title" /></div>
            <div class="col-md-3"><input id="bAuthor" class="form-control" placeholder="Author" /></div>
            <div class="col-md-2"><input id="bCat" class="form-control" placeholder="Category" /></div>
            <div class="col-md-1"><input id="bPrice" type="number" step="0.01" class="form-control" placeholder="Price" /></div>
            <div class="col-md-2"><input id="bDesc" class="form-control" placeholder="Description" /></div>
          </div>
          <div id="addBookError" class="text-danger small mt-2 hidden"></div>
          <button class="btn btn-brass mt-3" id="addBookBtn">Add book</button>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table align-middle bg-white">
          <thead><tr><th>Title</th><th>Author</th><th>Category</th><th class="text-end">Price</th><th></th></tr></thead>
          <tbody id="adminBooks"></tbody>
        </table>
      </div>
    </section>

    <!-- ADMIN: ALL ORDERS -->
    <section id="allOrdersView" class="hidden">
      <h4 class="display-font mb-3">All Orders</h4>
      <div id="allOrdersList"></div>
      <div id="allOrdersEmpty" class="text-muted hidden">No orders have been placed yet.</div>
    </section>
  </div>
</div>

<script>
// For local dev this points at the API; in production it is rewritten to ""
// (same-origin) so CloudFront proxies /api/* to the load balancer.
const API = "http://localhost:3000";

let token = localStorage.getItem('bn_token') || '';
let user = JSON.parse(localStorage.getItem('bn_user') || 'null');
let activeCat = '';

const $ = (id) => document.getElementById(id);
const show = (el) => el.classList.remove('hidden');
const hide = (el) => el.classList.add('hidden');
const money = (n) => '$' + Number(n).toFixed(2);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function api(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  const data = res.status === 204 ? null : await res.json().catch(() => null);
  if (!res.ok) throw new Error((data && data.error) || 'Request failed');
  return data;
}

// ---------- auth ----------
async function login() {
  hide($('loginError'));
  try {
    const data = await fetch(API + '/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value })
    }).then(r => r.json().then(j => ({ ok: r.ok, j })));
    if (!data.ok) throw new Error(data.j.error || 'Login failed');
    token = data.j.token; user = data.j.user;
    localStorage.setItem('bn_token', token);
    localStorage.setItem('bn_user', JSON.stringify(user));
    startApp();
  } catch (e) { $('loginError').textContent = e.message; show($('loginError')); }
}
function logout() {
  token = ''; user = null;
  localStorage.removeItem('bn_token'); localStorage.removeItem('bn_user');
  hide($('appView')); show($('loginView'));
}

// ---------- nav ----------
const VIEWS = ['browseView','cartView','ordersView','manageView','allOrdersView'];
function switchTo(view) {
  VIEWS.forEach(v => hide($(v)));
  show($(view));
  document.querySelectorAll('#navTabs .nav-link').forEach(a => a.classList.toggle('active', a.dataset.view === view));
  if (view === 'browseView') loadBooks();
  if (view === 'cartView') loadCart();
  if (view === 'ordersView') loadOrders();
  if (view === 'manageView') loadAdminBooks();
  if (view === 'allOrdersView') loadAllOrders();
}
function buildNav() {
  const tabs = user.role === 'admin'
    ? [['manageView','Manage Books'], ['allOrdersView','All Orders']]
    : [['browseView','Browse'], ['cartView','Cart'], ['ordersView','Orders']];
  $('navTabs').innerHTML = tabs.map(([v,l]) =>
    `<a class="nav-link" href="#" data-view="${v}">${l}</a>`).join('');
  document.querySelectorAll('#navTabs .nav-link').forEach(a =>
    a.onclick = (e) => { e.preventDefault(); switchTo(a.dataset.view); });
}
function startApp() {
  hide($('loginView')); show($('appView'));
  $('navUser').textContent = user.username + (user.role === 'admin' ? ' (admin)' : '');
  buildNav();
  switchTo(user.role === 'admin' ? 'manageView' : 'browseView');
}

// ---------- browse / cart / orders (users) ----------
async function loadBooks() {
  const params = new URLSearchParams();
  if ($('search').value.trim()) params.set('search', $('search').value.trim());
  if (activeCat) params.set('category', activeCat);
  const [books, cats] = await Promise.all([
    api('/api/books?' + params.toString()),
    api('/api/categories')
  ]);
  $('categories').innerHTML =
    `<span class="badge rounded-pill cat-pill ${activeCat===''?'text-bg-dark':'text-bg-light'}" data-cat="">All</span>` +
    cats.map(c => `<span class="badge rounded-pill cat-pill ${activeCat===c.category?'text-bg-dark':'text-bg-light'}" data-cat="${esc(c.category)}">${esc(c.category)} (${c.count})</span>`).join('');
  document.querySelectorAll('.cat-pill').forEach(p => p.onclick = () => { activeCat = p.dataset.cat; loadBooks(); });
  $('books').innerHTML = books.map(b => `
    <div class="col-sm-6 col-lg-4">
      <div class="book-card h-100 p-3 d-flex flex-column">
        <span class="badge text-bg-light align-self-start mb-2">${esc(b.category)}</span>
        <div class="display-font fs-5">${esc(b.title)}</div>
        <div class="text-muted small mb-2">${esc(b.author)}</div>
        <div class="small flex-grow-1">${esc(b.description)}</div>
        <div class="d-flex justify-content-between align-items-center mt-3">
          <span class="price fs-5">${money(b.price)}</span>
          <button class="btn btn-sm btn-brass" data-add="${b.id}">Add to cart</button>
        </div>
      </div>
    </div>`).join('') || '<p class="text-muted">No books found.</p>';
  document.querySelectorAll('[data-add]').forEach(btn => btn.onclick = async () => {
    await api('/api/cart', { method: 'POST', body: JSON.stringify({ book_id: Number(btn.dataset.add), quantity: 1 }) });
    btn.textContent = 'Added ✓'; setTimeout(() => btn.textContent = 'Add to cart', 900);
  });
}

async function loadCart() {
  const cart = await api('/api/cart');
  if (!cart.items.length) { $('cartItems').innerHTML=''; show($('cartEmpty')); hide($('checkoutBox')); return; }
  hide($('cartEmpty')); show($('checkoutBox'));
  $('cartItems').innerHTML = cart.items.map(i => `
    <div class="card mb-2"><div class="card-body d-flex justify-content-between align-items-center">
      <div><div class="fw-semibold">${esc(i.title)}</div><div class="text-muted small">${esc(i.author)} · ${money(i.price)}</div></div>
      <div class="d-flex align-items-center gap-2">
        <input type="number" min="0" value="${i.quantity}" class="form-control form-control-sm" style="width:70px" data-qty="${i.id}">
        <span class="price" style="width:80px;text-align:right">${money(i.line_total)}</span>
        <button class="btn btn-sm btn-outline-danger" data-del="${i.id}">×</button>
      </div>
    </div>`).join('');
  $('subtotal').textContent = money(cart.subtotal);
  document.querySelectorAll('[data-qty]').forEach(inp => inp.onchange = async () => {
    await api('/api/cart/' + inp.dataset.qty, { method:'PUT', body: JSON.stringify({ quantity: Number(inp.value) }) });
    loadCart();
  });
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    await api('/api/cart/' + b.dataset.del, { method:'DELETE' }); loadCart();
  });
}

async function placeOrder() {
  try {
    await api('/api/orders', { method:'POST', body: JSON.stringify({
      customer_name: $('cName').value.trim(), email: $('cEmail').value.trim(), address: $('cAddr').value.trim() }) });
    $('cName').value = $('cEmail').value = $('cAddr').value = '';
    switchTo('ordersView');
  } catch (e) { alert(e.message); }
}

async function loadOrders() {
  const orders = await api('/api/orders');
  renderOrders(orders, $('ordersList'), $('ordersEmpty'), false);
}

// ---------- admin ----------
async function loadAdminBooks() {
  const books = await api('/api/books');
  $('adminBooks').innerHTML = books.map(b => `
    <tr>
      <td>${esc(b.title)}</td><td>${esc(b.author)}</td><td>${esc(b.category)}</td>
      <td class="text-end price">${money(b.price)}</td>
      <td class="text-end"><button class="btn btn-sm btn-outline-danger" data-rm="${b.id}">Remove</button></td>
    </tr>`).join('');
  document.querySelectorAll('[data-rm]').forEach(btn => btn.onclick = async () => {
    if (!confirm('Remove this book?')) return;
    await api('/api/books/' + btn.dataset.rm, { method:'DELETE' });
    loadAdminBooks();
  });
}

async function addBook() {
  hide($('addBookError'));
  const body = {
    title: $('bTitle').value.trim(), author: $('bAuthor').value.trim(),
    category: $('bCat').value.trim(), price: $('bPrice').value, description: $('bDesc').value.trim()
  };
  if (!body.title || !body.author || !body.category || body.price === '') {
    $('addBookError').textContent = 'Title, author, category and price are required.'; show($('addBookError')); return;
  }
  try {
    await api('/api/books', { method:'POST', body: JSON.stringify(body) });
    ['bTitle','bAuthor','bCat','bPrice','bDesc'].forEach(id => $(id).value = '');
    loadAdminBooks();
  } catch (e) { $('addBookError').textContent = e.message; show($('addBookError')); }
}

async function loadAllOrders() {
  const orders = await api('/api/admin/orders');
  renderOrders(orders, $('allOrdersList'), $('allOrdersEmpty'), true);
}

function renderOrders(orders, listEl, emptyEl, showUser) {
  if (!orders.length) { listEl.innerHTML=''; show(emptyEl); return; }
  hide(emptyEl);
  listEl.innerHTML = orders.map(o => `
    <div class="card mb-2"><div class="card-body">
      <div class="d-flex justify-content-between">
        <div>
          <span class="fw-semibold">Order #${o.id}</span>
          ${showUser ? `<span class="badge text-bg-secondary ms-2">${esc(o.username)}</span>` : ''}
          <div class="text-muted small">${new Date(o.created_at).toLocaleString()} · ${esc(o.customer_name)} · ${esc(o.email)}</div>
        </div>
        <span class="price fs-5">${money(o.total)}</span>
      </div>
      <ul class="small mt-2 mb-0">
        ${o.items.map(i => `<li>${esc(i.title)} × ${i.quantity} — ${money(i.price)}</li>`).join('')}
      </ul>
    </div></div>`).join('');
}

// ---------- wire up ----------
$('loginBtn').onclick = login;
$('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
$('logoutBtn').onclick = logout;
$('placeOrder').onclick = placeOrder;
$('addBookBtn').onclick = addBook;
let searchTimer;
$('search').addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(loadBooks, 250); });

// boot: if we have a token, verify it; else show login
(async () => {
  if (token && user) {
    try { await api('/api/me'); startApp(); }
    catch { logout(); }
  } else { show($('loginView')); }
})();
</script>
</body>
</html>
